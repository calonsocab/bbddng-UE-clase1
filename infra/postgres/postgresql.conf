# Configuración PostgreSQL 16 para clase01-intro
# Optimizada para observabilidad didáctica, no para producción

# --- Red: escuchar en todas las interfaces para que Docker port-mapping funcione ---
listen_addresses = '*'

# --- Extensiones ---
shared_preload_libraries = 'pg_stat_statements'

# --- WAL y replicación ---
wal_level = replica
max_wal_senders = 3
wal_keep_size = 256MB
hot_standby = on

# --- Observabilidad de queries ---
pg_stat_statements.track = all
pg_stat_statements.max = 10000
log_min_duration_statement = 100    # log queries > 100ms
log_checkpoints = on
log_lock_waits = on
deadlock_timeout = 1s               # detectar deadlocks rápido para los ejercicios

# --- Memoria (deliberadamente limitada para que los efectos sean visibles) ---
shared_buffers = 256MB
work_mem = 64MB                     # suficiente para sentir el dolor en JOINs grandes
maintenance_work_mem = 128MB
effective_cache_size = 1GB

# --- Conexiones ---
max_connections = 200

# --- Checkpoints ---
checkpoint_completion_target = 0.9
checkpoint_timeout = 5min

# --- Autovacuum (activo, para que el ejercicio 1 de MVCC sea realista) ---
autovacuum = on
autovacuum_vacuum_cost_delay = 2ms

# --- Formato de log legible ---
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'
